name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type-check
        run: npm run typecheck
        env:
          # Provide dummy env values so tsc can resolve env.ts without crashing
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_APP_NAME: StyleAI
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          SUPABASE_STORAGE_BUCKET: selfies
          OPENAI_API_KEY: sk-placeholder
          OPENAI_VISION_MODEL: gpt-4o
          OPENAI_MINI_MODEL: gpt-4o-mini
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: placeholder
          AWS_SECRET_ACCESS_KEY: placeholder
          NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_placeholder
          RAZORPAY_KEY_SECRET: placeholder
          RAZORPAY_WEBHOOK_SECRET: placeholder
          NEXT_PUBLIC_PAID_PRICE_USD: "9.99"
          NEXT_PUBLIC_PAID_PRICE_INR: "829"
          NEXT_PUBLIC_ENABLE_PDF: "true"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_APP_NAME: StyleAI
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          SUPABASE_STORAGE_BUCKET: selfies
          OPENAI_API_KEY: sk-placeholder
          OPENAI_VISION_MODEL: gpt-4o
          OPENAI_MINI_MODEL: gpt-4o-mini
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: placeholder
          AWS_SECRET_ACCESS_KEY: placeholder
          NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_placeholder
          RAZORPAY_KEY_SECRET: placeholder
          RAZORPAY_WEBHOOK_SECRET: placeholder
          NEXT_PUBLIC_PAID_PRICE_USD: "9.99"
          NEXT_PUBLIC_PAID_PRICE_INR: "829"
          NEXT_PUBLIC_ENABLE_PDF: "true"
